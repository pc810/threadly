<!DOCTYPE html>
<html prefix="og: https://ogp.me/ns# fb: https://www.facebook.com/2008/fbml">
  <head>
    <meta charset="UTF-8" />
    <title>Example Page with OG Image</title>

    <!-- Basic Open Graph Meta Tags -->
    <meta property="og:title" content="Example Page Title" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://127.0.0.1:5500/demo" />
    <meta property="og:site_name" content="Example Site" />
    <meta
      property="og:description"
      content="This is an example page to demonstrate OG image meta tags."
    />

    <!-- Primary Open Graph Image -->
    <meta
      property="og:image"
      content="/demo/public/bailey-zindel-NRQV-hBF10M-unsplash.jpg"
    />
    <meta
      property="og:image:secure_url"
      content="http://127.0.0.1:5500/demo/public/bailey-zindel-NRQV-hBF10M-unsplash.jpg"
    />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="An illustrative example of OG image"
    />

    <!-- Additional images -->
    <meta
      property="og:image"
      content="http://127.0.0.1:5500/demo/public/mo-zFZeklnMxOw-unsplash.jpg"
    />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="600" />

    <!-- Facebook-Specific Meta Tags -->
    <meta property="fb:app_id" content="1234567890" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Example Page Title" />
    <meta
      name="twitter:description"
      content="This is an example page to demonstrate Twitter Card image meta tags."
    />
    <meta
      name="twitter:image"
      content="http://127.0.0.1:5500/demo/public/pietro-de-grandi-T7K4aEPoGGk-unsplash.jpg"
    />
    <meta name="twitter:image:alt" content="Alt text for Twitter image" />
    <meta name="twitter:site" content="@example" />
    <meta name="twitter:creator" content="@creatorhandle" />

    <!-- Generic Meta Tags for SEO -->
    <meta
      name="description"
      content="Example page demonstrating all types of OG and social image meta tags."
    />
  </head>
  <body>
    <h1>Example of Open Graph Image Meta Tags</h1>
    <p>
      This page contains various Open Graph and social media image meta tags for
      preview customization.
    </p>
    <img
      width="640"
      height="427"
      src="http://127.0.0.1:5500/demo/public/pietro-de-grandi-T7K4aEPoGGk-unsplash.jpg"
    />
  </body>
</html>
